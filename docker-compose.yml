services:
  frivas-web:
    build:
      context: .
    container_name: frivas-web
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - sotter-network
    labels:
      - traefik.enable=true
      - traefik.http.services.frivas.loadbalancer.server.port=3000

      - traefik.http.routers.frivas.rule=Host(`frivassteel.ca`) || Host(`www.frivassteel.ca`)
      - traefik.http.routers.frivas.entrypoints=websecure
      - traefik.http.routers.frivas.tls=true
      - traefik.http.routers.frivas.tls.certresolver=letsencrypt

      - traefik.http.routers.frivas-http.rule=Host(`frivassteel.ca`) || Host(`www.frivassteel.ca`)
      - traefik.http.routers.frivas-http.entrypoints=web
      - traefik.http.routers.frivas-http.service=frivas

networks:
  sotter-network:
    external: true